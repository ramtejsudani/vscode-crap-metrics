name: Build Extension

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Show repo structure
        run: tree -L 3

      - name: Restore
        run: dotnet restore server/CrapMetricsServer/Crapmetricsserver.csproj
      
      - name: Build
        run: dotnet build server/CrapMetricsServer/Crapmetricsserver.csproj --no-restore --configuration Release

      - name: Package VSIX
        run: npx @vscode/vsce package
        working-directory: client

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-crap-metrics
          path: client/*.vsix
