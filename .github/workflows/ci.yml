name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Print repo structure
        run: |
          echo "Working directory:"
          pwd
          echo "Listing files:"
          find .
      
      - name: Restore
        run: dotnet restore server/CrapMetricsServer/Crapmetricsserver.csproj
      
      - name: Build
        run: dotnet build server/CrapMetricsServer/Crapmetricsserver.csproj --no-restore --configuration Release

  client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Compile TypeScript
        run: npm run compile
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client
        continue-on-error: true
