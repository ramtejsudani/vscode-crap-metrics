name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore server/CrapMetricsServer/CrapMetricsServer.csproj

      - name: Build
        run: dotnet build server/CrapMetricsServer/CrapMetricsServer.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test server/CrapMetricsServer.Tests/CrapMetricsServer.Tests.csproj --no-restore --configuration Release --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: TestResults
          fail_ci_if_error: false

  client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Compile TypeScript
        run: npm run compile
        working-directory: client

      - name: Lint
        run: npm run lint
        working-directory: client
        continue-on-error: true
